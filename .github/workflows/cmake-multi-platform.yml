name: CMake Multi-Platform Build

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

permissions:
  contents: read

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
            qt_version: 6.11.0
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
            qt_version: 6.11.0
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
            qt_version: 6.11.0

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    # Linux: Install dependencies
    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          qt6-base-dev \
          qt6-gui-dev \
          qt6-qml-dev \
          qt6-quick-dev \
          qt6-svg-dev \
          qt6-declarative-dev \
          qt6-tools-dev \
          libgl1-mesa-dev

    # Windows: Setup Qt
    - name: Install Qt on Windows
      if: runner.os == 'Windows'
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.11.0'
        host: windows
        target: desktop
        arch: win64_msvc2022_64
        modules: 'qtbase qtsvg qtdeclarative qtnetwork'
        cache: true

    # macOS: Setup Qt
    - name: Install Qt on macOS
      if: runner.os == 'macOS'
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.11.0'
        host: mac
        target: desktop
        arch: clang_64
        modules: 'qtbase qtsvg qtdeclarative qtnetwork'
        cache: true

    # Linux: Setup CMake and compile
    - name: Set up CMake on Linux
      if: runner.os == 'Linux'
      uses: lukka/get-cmake@latest

    - name: Configure CMake (Linux)
      if: runner.os == 'Linux'
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
        -S ${{ github.workspace }}

    - name: Build (Linux)
      if: runner.os == 'Linux'
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ env.BUILD_TYPE }}

    # Windows: Configure and build
    - name: Configure CMake (Windows)
      if: runner.os == 'Windows'
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"
        -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
        -G "Visual Studio 17 2022"
        -S ${{ github.workspace }}

    - name: Build (Windows)
      if: runner.os == 'Windows'
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ env.BUILD_TYPE }}

    # macOS: Configure and build
    - name: Configure CMake (macOS)
      if: runner.os == 'macOS'
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"
        -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
        -S ${{ github.workspace }}

    - name: Build (macOS)
      if: runner.os == 'macOS'
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ env.BUILD_TYPE }}

    # Test (if available)
    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: ctest --build-config ${{ env.BUILD_TYPE }} --output-on-failure
      continue-on-error: true

    # Upload build artifacts
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: build-${{ matrix.os }}
        path: ${{ steps.strings.outputs.build-output-dir }}
        retention-days: 7
